[tool.uv.workspace]
members = [
    "services/market-ingestor",
    "services/mock-pm-app",
    "streaming/flink-jobs",
    "dashboard",
    "libs/shared-schemas",
    "libs/common",
    "specs",
]

[tool.uv]
dev-dependencies = [
    "ruff>=0.15.0",
    "mypy>=2.1.0",
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "jsonschema>=4.26.0",
]

# apache-beam (pulled in transitively by apache-flink) has a legacy setup.py
# that imports pkg_resources at build time without declaring it as a build
# dependency. Under PEP 517 isolated builds this raises ModuleNotFoundError
# unless a setuptools version that still bundles pkg_resources is explicitly
# added here — current setuptools (82.x) has dropped pkg_resources entirely.
[tool.uv.extra-build-dependencies]
apache-beam = ["setuptools<81"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
